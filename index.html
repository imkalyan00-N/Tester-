```html
<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML File Downloader</title>
    <!-- Tailwind CSS kosam CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-xl shadow-lg p-6 sm:p-8 w-full max-w-3xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">
                <i class="fas fa-file-code text-blue-500 mr-2"></i>HTML Code Downloader
            </h1>
            <p class="text-gray-500">Mee code ni kinda paste chesi, direct ga .html file ga download cheskondi.</p>
        </div>

        <!-- File Name Input -->
        <div class="mb-4">
            <label for="filename" class="block text-sm font-medium text-gray-700 mb-1">File Peru (Optional)</label>
            <div class="relative">
                <input type="text" id="filename" placeholder="index" 
                    class="w-full pl-4 pr-16 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-400">
                    .html
                </div>
            </div>
        </div>

        <!-- Code Textarea -->
        <div class="mb-6">
            <label for="codeContent" class="block text-sm font-medium text-gray-700 mb-1">Code ikkada paste cheyandi</label>
            <textarea id="codeContent" rows="12" placeholder="<!DOCTYPE html>&#10;<html>&#10;<body>&#10;  <h1>Hello World</h1>&#10;</body>&#10;</html>" 
                class="w-full p-4 border border-gray-300 rounded-lg font-mono text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-y"></textarea>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4">
            <button onclick="downloadFile()" 
                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2">
                <i class="fas fa-download"></i> Download HTML File
            </button>
            <button onclick="clearContent()" 
                class="sm:w-auto bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 px-6 rounded-lg transition-all flex items-center justify-center gap-2">
                <i class="fas fa-trash-alt"></i> Clear
            </button>
        </div>
        
        <!-- Status Message -->
        <div id="statusMessage" class="mt-4 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        // File download chese function
        function downloadFile() {
            const codeContent = document.getElementById('codeContent').value;
            let filenameInput = document.getElementById('filename').value.trim();
            const statusMessage = document.getElementById('statusMessage');

            // Code emi lekapothe alert ivvandi (UI lo message chupinchadam)
            if (!codeContent) {
                showMessage("Dayachesi code ni paste cheyandi!", "text-red-500");
                return;
            }

            // Filename lekapothe default ga 'index.html' ani ivvandi
            if (!filenameInput) {
                filenameInput = "index";
            }

            // Extension .html ani confirm cheskondi
            const finalFilename = filenameInput.endsWith('.html') ? filenameInput : `${filenameInput}.html`;

            try {
                // Blob create cheyadam (Text ni file data ga marchadam)
                const blob = new Blob([codeContent], { type: 'text/html;charset=utf-8' });
                
                // Temporary URL create cheyadam
                const url = URL.createObjectURL(blob);
                
                // Invisible 'a' tag create chesi download trigger cheyadam
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = finalFilename;
                
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showMessage(`Success! ${finalFilename} download ayyindi.`, "text-green-600");
            } catch (error) {
                console.error("Download fail ayyindi:", error);
                showMessage("Download fail ayyindi. Malli try cheyandi.", "text-red-500");
            }
        }

        // Textarea clear chese function
        function clearContent() {
            document.getElementById('codeContent').value = '';
            document.getElementById('filename').value = '';
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.classList.add('hidden');
        }

        // Message chupinchadaniki helper function
        function showMessage(text, colorClass) {
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.textContent = text;
            statusMsg.className = `mt-4 text-center text-sm font-medium ${colorClass}`;
            statusMsg.classList.remove('hidden');
            
            // 3 seconds tarvata message hide cheyali
            setTimeout(() => {
                statusMsg.classList.add('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
