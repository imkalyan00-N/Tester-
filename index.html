<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vere Level SQL Pro - 100 Rs Bet Edition</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }
        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        /* Custom Scrollbar for Hacker Vibe */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #06b6d4; 
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            border: 2px solid #1e293b;
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="selection:bg-cyan-500/30 min-h-screen">

    <!-- Navbar -->
    <header class="bg-[#1e293b] border-b border-gray-800 p-4 sticky top-0 z-10 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-cyan-500 to-blue-500 p-2 rounded-lg">
                    <i class="fas fa-bolt text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-400">
                        Vere Level SQL Pro
                    </h1>
                    <p class="text-gray-400 text-xs md:text-sm font-medium tracking-wide">100 Rupees Bet Edition 🔥 (HTML Version)</p>
                </div>
            </div>
            <div class="flex bg-[#0f172a] p-1 rounded-lg border border-gray-700">
                <button id="tab-queries-btn" onclick="switchTab('queries')" class="flex items-center gap-2 px-4 py-2 rounded-md font-medium transition-all text-sm bg-cyan-500/20 text-cyan-400 border border-cyan-500/50 shadow-[0_0_10px_rgba(6,182,212,0.2)]">
                    <i class="fas fa-terminal"></i> SQL Playground
                </button>
                <button id="tab-tables-btn" onclick="switchTab('tables')" class="flex items-center gap-2 px-4 py-2 rounded-md font-medium transition-all text-sm text-gray-400 hover:text-gray-200 border border-transparent">
                    <i class="fas fa-table"></i> Raw Database
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Sidebar -->
        <div id="sidebar-container" class="lg:col-span-3 space-y-4">
            <div class="bg-[#1e293b] rounded-xl border border-gray-700 overflow-hidden shadow-xl">
                <div class="p-4 bg-[#0f172a] border-b border-gray-700 flex items-center justify-between">
                    <span class="font-bold text-gray-200">Query List</span>
                    <span class="bg-cyan-500/20 text-cyan-400 text-xs px-2 py-1 rounded font-bold border border-cyan-500/30">8 Items</span>
                </div>
                <div id="query-list" class="flex flex-col max-h-[70vh] overflow-y-auto">
                    <!-- Query list buttons will be injected here by JS -->
                </div>
            </div>
        </div>

        <!-- Content Area -->
        <div id="content-container" class="lg:col-span-9">
            
            <!-- Tables View -->
            <div id="tables-view" class="hidden fade-in space-y-8">
                <div id="tables-content"></div>
            </div>

            <!-- Queries/IDE View -->
            <div id="queries-view" class="space-y-6 fade-in">
                
                <!-- Goal & Tanglish Card -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Goal -->
                    <div class="bg-gradient-to-br from-[#1e293b] to-[#0f172a] p-5 rounded-xl border border-gray-700 shadow-xl">
                        <div class="flex items-center gap-2 mb-3">
                            <i class="fas fa-bullseye text-yellow-400 text-xl"></i>
                            <h3 class="font-bold text-gray-200">The Target</h3>
                        </div>
                        <p id="query-goal" class="text-gray-300 text-sm leading-relaxed"></p>
                    </div>

                    <!-- Tanglish Explanation -->
                    <div class="bg-gradient-to-br from-indigo-900/40 to-blue-900/20 p-5 rounded-xl border border-indigo-500/30 shadow-xl relative overflow-hidden group">
                        <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                            <i class="fas fa-exclamation-circle text-6xl"></i>
                        </div>
                        <div class="flex items-center gap-2 mb-3">
                            <i class="fas fa-info-circle text-indigo-400 text-xl"></i>
                            <h3 class="font-bold text-indigo-300">Tanglish Lo... (Local Style)</h3>
                        </div>
                        <p id="query-tanglish" class="text-indigo-100 text-sm leading-relaxed relative z-10"></p>
                    </div>
                </div>

                <!-- IDE Editor -->
                <div class="bg-[#000000] rounded-xl shadow-2xl border border-gray-800 overflow-hidden">
                    <div class="flex justify-between items-center px-4 py-2 bg-[#111111] border-b border-gray-800">
                        <div class="flex gap-2 items-center">
                            <div class="flex gap-1.5">
                                <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                                <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                                <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                            </div>
                            <span class="ml-2 text-gray-500 font-mono text-xs">workspace.sql</span>
                        </div>
                        
                        <div class="flex gap-2 items-center">
                            <button onclick="copyCode()" id="copy-btn" class="text-gray-400 hover:text-white p-1.5 rounded transition-colors" title="Copy Code">
                                <i class="fas fa-copy"></i>
                            </button>
                            <button onclick="runCode()" id="run-btn" class="flex items-center justify-center min-w-[120px] bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 text-white px-5 py-1.5 rounded font-bold text-sm transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:shadow-[0_0_20px_rgba(6,182,212,0.6)] transform hover:-translate-y-0.5">
                                <i class="fas fa-play mr-2 text-xs"></i> Run Code
                            </button>
                        </div>
                    </div>
                    
                    <!-- Code Area -->
                    <div id="sql-code" class="p-4 font-mono text-[15px] overflow-x-auto text-gray-300">
                        <!-- Code injected by JS -->
                    </div>
                </div>

                <!-- Output Terminal -->
                <div id="output-terminal" class="hidden fade-in bg-[#0f172a] rounded-xl border border-gray-700 overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.5)]">
                    <div class="bg-[#1e293b] px-4 py-2 border-b border-gray-700 flex items-center justify-between">
                        <h3 class="font-mono text-xs text-green-400 flex items-center gap-2">
                            <i class="fas fa-terminal"></i> query_result_success.out
                        </h3>
                        <span id="output-rows-count" class="text-xs font-mono text-gray-400 bg-black/50 px-2 py-0.5 rounded">
                            Rows returned: 0
                        </span>
                    </div>
                    <div class="overflow-x-auto p-4">
                        <table class="w-full text-sm text-left">
                            <thead id="output-thead" class="text-gray-400 uppercase font-mono text-xs border-b border-gray-700">
                                <!-- Headers injected here -->
                            </thead>
                            <tbody id="output-tbody" class="font-mono text-gray-300 text-sm">
                                <!-- Data injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- JS Logic -->
    <script>
        // Database Mock
        const tablesData = {
            sailors: {
                columns: ['SID', 'SNAME', 'RATING', 'AGE'],
                data: [
                    [22, 'dustin', 7, 45], [29, 'brutus', 1, 33], [31, 'lubber', 8, 55.5],
                    [32, 'andy', 8, 25.5], [58, 'rusty', 10, 35], [64, 'horatio', 7, 35],
                    [71, 'zorba', 10, 16], [74, 'horatio', 9, 40], [85, 'art', 3, 25.5], [95, 'bob', 3, 63.5]
                ]
            },
            boats: {
                columns: ['BID', 'BNAME', 'COLOR'],
                data: [
                    [101, 'interlake', 'blue'], [102, 'interlake', 'red'],
                    [103, 'clipper', 'green'], [104, 'marine', 'red']
                ]
            },
            reserves: {
                columns: ['SID', 'BID', 'DAY'],
                data: [
                    [22, 101, '10-OCT-98'], [22, 102, '11-OCT-98'], [22, 103, '08-OCT-98'], [22, 104, '07-OCT-98'],
                    [31, 102, '10-NOV-98'], [31, 103, '06-NOV-98'], [31, 104, '12-NOV-98'],
                    [64, 101, '05-SEP-98'], [64, 102, '08-SEP-98'], [74, 103, '08-SEP-98']
                ]
            }
        };

        const queriesData = [
            {
                id: 1,
                title: "UNION Operator",
                subtitle: "Q1 & Q2 combined",
                goal: "Red boat leda Green boat reserve cheskunna sailors perlu ravali.",
                tanglish: "Bhaiyya, UNION ante mana 'RRR' movie lo Tarak, Charan iddarni kalipinattu! 🔥 Ikkada Red boat unna vallani, Green boat unna vallani iddarni kalipi okate list chestham. Kani rule entante, okkadu rendu sarlu vasthe (duplicates), bouncer gadu lopaliki raniyadu. Only unique names eh!",
                sql: "SELECT s.sname\nFROM sailors s, reserves r, boats b\nWHERE s.sid = r.sid AND r.bid = b.bid AND b.color = 'red'\nUNION\nSELECT s2.sname\nFROM sailors s2, boats b2, reserves r2\nWHERE s2.sid = r2.sid AND r2.bid = b2.bid AND b2.color = 'green';",
                columns: ['SNAME'],
                data: [['dustin'], ['horatio'], ['lubber']]
            },
            {
                id: 2,
                title: "INTERSECT Operator",
                subtitle: "Q3",
                goal: "Red boat AND Green boat rendu reserve cheskunna sailors perlu.",
                tanglish: "INTERSECT ante idi exact ga strict engineering principal laaga. 'Tammudu, neeku red boat unda? Okay. Green boat kuda unda? Aithe matrame lopaliki ra, lekapothe intiki po' antundi. Rendu strict ga unteనే common list lo add chesthadi.",
                sql: "SELECT s.sname\nFROM sailors s, reserves r, boats b\nWHERE s.sid = r.sid AND r.bid = b.bid AND b.color = 'red'\nINTERSECT\nSELECT s2.sname\nFROM sailors s2, boats b2, reserves r2\nWHERE s2.sid = r2.sid AND r2.bid = b2.bid AND b2.color = 'green';",
                columns: ['SNAME'],
                data: [['dustin'], ['horatio'], ['lubber']]
            },
            {
                id: 3,
                title: "IN Operator",
                subtitle: "Q4",
                goal: "Boat 103 reserve cheskunna vallu evaru?",
                tanglish: "Idi simple VIP Guest list check bhayya. VIP pass unna valla list (Boat 103 reserves list) theeskuni, 'Eyy, nee Sailor ID ee VIP list lo unda? IN the list? Aithe vachay lopaliki' antundi. Just direct matching anthe.",
                sql: "SELECT s.sname \nFROM sailors s \nWHERE s.sid IN (\n  SELECT r.sid FROM reserves r WHERE r.bid = 103 \n);",
                columns: ['SNAME'],
                data: [['dustin'], ['lubber'], ['horatio']]
            },
            {
                id: 4,
                title: "NOT IN Operator",
                subtitle: "Q5",
                goal: "Boat 103 reserve CHESKONI vallu evaru?",
                tanglish: "Idi Anti-VIP list. Bouncer thega aathram ga check chesthadu. 'Orey, ee Boat 103 list lo mee perlu unte meeku entry ledu, Dobbeyandi ikkannunchi' antadu. Asalu Boat 103 joliki vellani manchi pillalu evaro vallani select chesthadi.",
                sql: "SELECT s.sname\nFROM sailors s\nWHERE s.sid NOT IN (\n  SELECT r.sid FROM reserves r WHERE r.bid = 103 \n);",
                columns: ['SNAME'],
                data: [['brutus'], ['andy'], ['rusty'], ['zorba'], ['art'], ['bob']]
            },
            {
                id: 5,
                title: "EXISTS Operator",
                subtitle: "Q6",
                goal: "Boat 103 ni reserve cheskunna vallu (EXISTS vadi).",
                tanglish: "EXISTS ante mana CID Daya laaga. Database loki velli prathi sailor ID ni theeskuni, 'Daya, reserves table darwaza tod, eedi id tho boat 103 record unda leda chudu' antundi. Record EXISTS aite? Vaadi peru output lo eseyadame!",
                sql: "SELECT s.sname\nFROM sailors s\nWHERE EXISTS (\n  SELECT * FROM reserves r \n  WHERE r.bid = 103 AND r.sid = s.sid \n);",
                columns: ['SNAME'],
                data: [['dustin'], ['lubber'], ['horatio']]
            },
            {
                id: 6,
                title: "NOT EXISTS Operator",
                subtitle: "Q7",
                goal: "Boat 103 reserve CHESKONI sailors perlu.",
                tanglish: "Idhi CID Daya in reverse gear. Prathi odini check chesi, 'Saaaar, veedi meeda Boat 103 theeskunna evidence emmi dorakaledu saar' (NOT EXISTS) ani confirm ayithe matrame vaadi peru print chesthadi. Innocent varuku select avtharu.",
                sql: "SELECT s.sname\nFROM sailors s\nWHERE NOT EXISTS (\n  SELECT * FROM reserves r \n  WHERE r.bid = 103 AND r.sid = s.sid\n);",
                columns: ['SNAME'],
                data: [['brutus'], ['andy'], ['rusty'], ['horatio'], ['zorba'], ['art'], ['bob']]
            },
            {
                id: 7,
                title: "ANY Operator",
                subtitle: "Q8",
                goal: "Bob rating kante evado okari kante ekkuva rating unte chalu.",
                tanglish: "Pass mark concept bhaiyya idi! Exam lo state 1st rakarledu, pass aithe chalu. 'Bob' gadi multiple ratings list okati vasthadi... andulo ae okkati kante nee rating ekkuva unna (ANY one), nuvvu select ayipoyinatte! Just cross the minimum line.",
                sql: "SELECT s.sid\nFROM sailors s\nWHERE s.rating > ANY (\n  SELECT s2.rating FROM sailors s2 WHERE s2.sname = 'bob' \n);",
                columns: ['SID'],
                data: [[58], [71], [74], [31], [32], [64], [22]]
            },
            {
                id: 8,
                title: "ALL Operator",
                subtitle: "Q9",
                goal: "Highest rating unna sailors (Andari kante ekkuva).",
                tanglish: "Idi mana class topper gadi muchata. 'ALL' ante andaru ani. Subquery lo andari sailors ratings list osthadi... Nuvvu select avvali ante, nee rating ah list lo unna *ANDARI* kante equal or ekkuva undali. Thaggade le!",
                sql: "SELECT s.sid\nFROM sailors s\nWHERE s.rating >= ALL ( \n  SELECT s2.rating FROM sailors s2 \n);",
                columns: ['SID'],
                data: [[58], [71]]
            }
        ];

        let activeQueryId = 1;

        // Syntax Highlighter
        function highlightSQL(code) {
            const keywords = ['SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'UNION', 'INTERSECT', 'IN', 'NOT IN', 'EXISTS', 'NOT EXISTS', 'ANY', 'ALL'];
            const regex = new RegExp(`\\b(${keywords.join('|')})\\b`, 'gi');
            
            let lines = code.split('\n');
            let html = '';
            
            lines.forEach((line, i) => {
                let formattedLine = line.replace(regex, match => `<span class="text-pink-400 font-bold">${match.toUpperCase()}</span>`)
                                        .replace(/'[^']*'/g, match => `<span class="text-yellow-300">${match}</span>`);
                html += `<div class="leading-relaxed"><span class="text-gray-500 mr-4 select-none w-4 inline-block text-right">${i + 1}</span><span>${formattedLine}</span></div>`;
            });
            
            return html;
        }

        // Initialize App
        function initApp() {
            renderSidebar();
            loadQuery(activeQueryId);
            renderTables();
        }

        // Switch Tabs
        function switchTab(tabName) {
            const queriesBtn = document.getElementById('tab-queries-btn');
            const tablesBtn = document.getElementById('tab-tables-btn');
            const queriesView = document.getElementById('queries-view');
            const tablesView = document.getElementById('tables-view');
            const sidebar = document.getElementById('sidebar-container');
            const contentContainer = document.getElementById('content-container');

            if (tabName === 'queries') {
                // Button Styles
                queriesBtn.className = "flex items-center gap-2 px-4 py-2 rounded-md font-medium transition-all text-sm bg-cyan-500/20 text-cyan-400 border border-cyan-500/50 shadow-[0_0_10px_rgba(6,182,212,0.2)]";
                tablesBtn.className = "flex items-center gap-2 px-4 py-2 rounded-md font-medium transition-all text-sm text-gray-400 hover:text-gray-200 border border-transparent";
                
                // View Display
                queriesView.classList.remove('hidden');
                tablesView.classList.add('hidden');
                
                // Grid Layout
                sidebar.classList.remove('hidden');
                contentContainer.className = "lg:col-span-9";
                
            } else {
                // Button Styles
                tablesBtn.className = "flex items-center gap-2 px-4 py-2 rounded-md font-medium transition-all text-sm bg-cyan-500/20 text-cyan-400 border border-cyan-500/50 shadow-[0_0_10px_rgba(6,182,212,0.2)]";
                queriesBtn.className = "flex items-center gap-2 px-4 py-2 rounded-md font-medium transition-all text-sm text-gray-400 hover:text-gray-200 border border-transparent";
                
                // View Display
                tablesView.classList.remove('hidden');
                queriesView.classList.add('hidden');
                
                // Grid Layout
                sidebar.classList.add('hidden');
                contentContainer.className = "lg:col-span-12";
            }
        }

        // Render Sidebar Menu
        function renderSidebar() {
            const listContainer = document.getElementById('query-list');
            listContainer.innerHTML = '';
            
            queriesData.forEach(q => {
                const btn = document.createElement('button');
                btn.onclick = () => loadQuery(q.id);
                
                if (q.id === activeQueryId) {
                    btn.className = "text-left px-4 py-3 border-b border-gray-700/50 last:border-0 transition-all flex items-center justify-between group bg-gradient-to-r from-cyan-500/10 to-transparent border-l-4 border-l-cyan-400";
                    btn.innerHTML = `
                        <div>
                            <div class="font-semibold text-cyan-400">${q.title}</div>
                            <div class="text-xs text-gray-500 mt-1">${q.subtitle}</div>
                        </div>
                        <i class="fas fa-chevron-right text-cyan-400"></i>
                    `;
                } else {
                    btn.className = "text-left px-4 py-3 border-b border-gray-700/50 last:border-0 transition-all flex items-center justify-between group hover:bg-[#334155]";
                    btn.innerHTML = `
                        <div>
                            <div class="font-semibold text-gray-300 group-hover:text-white">${q.title}</div>
                            <div class="text-xs text-gray-500 mt-1">${q.subtitle}</div>
                        </div>
                    `;
                }
                listContainer.appendChild(btn);
            });
        }

        // Load Specific Query Data into IDE
        function loadQuery(id) {
            activeQueryId = id;
            renderSidebar(); // refresh active state
            
            const q = queriesData.find(x => x.id === id);
            
            document.getElementById('query-goal').innerText = q.goal;
            document.getElementById('query-tanglish').innerText = q.tanglish;
            document.getElementById('sql-code').innerHTML = highlightSQL(q.sql);
            
            // Hide terminal initially when a new query is loaded
            document.getElementById('output-terminal').classList.add('hidden');
        }

        // Run Code Animation and Render Output Table
        function runCode() {
            const runBtn = document.getElementById('run-btn');
            const terminal = document.getElementById('output-terminal');
            const q = queriesData.find(x => x.id === activeQueryId);
            
            // Loading State
            runBtn.innerHTML = '<span class="loader"></span> Executing...';
            runBtn.disabled = true;
            runBtn.classList.add('opacity-75', 'cursor-not-allowed');
            terminal.classList.add('hidden');
            
            // Fake execution delay
            setTimeout(() => {
                // Reset Button
                runBtn.innerHTML = '<i class="fas fa-play mr-2 text-xs"></i> Run Code';
                runBtn.disabled = false;
                runBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                
                // Build Output Table
                document.getElementById('output-rows-count').innerText = `Rows returned: ${q.data.length}`;
                
                // Headers
                const thead = document.getElementById('output-thead');
                thead.innerHTML = `<tr>${q.columns.map(col => `<th class="px-4 py-2">${col}</th>`).join('')}</tr>`;
                
                // Body
                const tbody = document.getElementById('output-tbody');
                if (q.data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="${q.columns.length}" class="px-4 py-4 text-center text-gray-600 italic">0 rows selected</td></tr>`;
                } else {
                    tbody.innerHTML = q.data.map(row => 
                        `<tr class="border-b border-gray-800 hover:bg-gray-800/50 transition-colors">
                            ${row.map(cell => `<td class="px-4 py-2">${typeof cell === 'string' ? `'${cell}'` : cell}</td>`).join('')}
                        </tr>`
                    ).join('');
                }
                
                // Show Terminal
                terminal.classList.remove('hidden');
            }, 800);
        }

        // Copy Code Functionality (Using older execCommand for iframe safety as requested)
        function copyCode() {
            const q = queriesData.find(x => x.id === activeQueryId);
            
            // Create a temporary textarea to hold the text
            const textarea = document.createElement("textarea");
            textarea.value = q.sql;
            textarea.style.position = "fixed";  // Prevent scrolling to bottom
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                const copyBtn = document.getElementById('copy-btn');
                copyBtn.innerHTML = '<i class="fas fa-check-circle text-green-400"></i>';
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i>';
                }, 2000);
            } catch (err) {
                console.error('Failed to copy text', err);
            } finally {
                document.body.removeChild(textarea);
            }
        }

        // Render Database Tables View
        function renderTables() {
            const container = document.getElementById('tables-content');
            let html = '';
            
            const createTableHtml = (title, dataObj) => `
                <div class="mb-8 bg-[#1e293b] border border-gray-700 rounded-xl overflow-hidden shadow-xl">
                    <div class="bg-[#0f172a] px-4 py-3 border-b border-gray-700">
                        <h3 class="font-semibold text-cyan-400 flex items-center gap-2">
                            <i class="fas fa-database"></i> ${title.toUpperCase()} TABLE
                        </h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left text-gray-300">
                            <thead class="text-xs text-gray-400 uppercase bg-[#1e293b] border-b border-gray-700">
                                <tr>
                                    ${dataObj.columns.map(col => `<th class="px-6 py-3 font-bold tracking-wider">${col}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                ${dataObj.data.map(row => `
                                    <tr class="border-b border-gray-700/50 hover:bg-[#334155] transition-colors">
                                        ${row.map(cell => `<td class="px-6 py-4">${cell}</td>`).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            html += createTableHtml('Sailors', tablesData.sailors);
            html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-8">`;
            html += createTableHtml('Boats', tablesData.boats);
            html += createTableHtml('Reserves', tablesData.reserves);
            html += `</div>`;
            
            container.innerHTML = html;
        }

        // Run Initialization when DOM is loaded
        window.onload = initApp;
    </script>
</body>
</html>
