            overflow: hidden;

        .code-box {
            background-color: #0f172a;
            color: #38bdf8;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            padding: 16px;
            border-radius: 0 0 12px 12px;
            overflow-x: auto;
            white-space: pre;
            line-height: 1.6;
        }

        /* Output Box - Attractive & Safe */
        .output-box {
            background-color: #ffffff;
            border: 2px solid #cbd5e1;
            border-top: none;
            padding: 20px;
            border-radius: 0 0 12px 12px;
            overflow-x: auto;
        }

        /* Explanation Box */
        .expl-box {
            background: linear-gradient(to right, #fffbeb, #fef3c7);
            border-left: 6px solid #f59e0b;
            border-radius: 0 0 12px 12px;
            padding: 20px;
            font-size: 15px;
            color: #92400e;
            line-height: 1.7;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);

        .section-title {
            padding: 12px 16px;
            border-radius: 12px 12px 0 0;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            padding: 10px 18px;
            background-color: #ffffff;
            color: #475569;
            border-radius: 30px;
            font-weight: 700;

        let activeIndex = 0;

        // Syntax Highlighter (Transforms basic HTML text to colorful text)
        function highlightHTML(code) {
            let lines = code.split('\n');
            let highlighted = '';
            lines.forEach((line, i) => {
                let formattedLine = line
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/(&lt;\/?[\w\d]+)/g, '<span class="text-pink-400 font-bold">$1</span>') // tags
                    .replace(/(&gt;)/g, '<span class="text-pink-400 font-bold">$1</span>')
                    .replace(/([a-zA-Z\-]+)=&quot;/g, '<span class="text-emerald-400">$1</span>=&quot;') // attributes
                    .replace(/&quot;([^&]*)&quot;/g, '&quot;<span class="text-yellow-300">$1</span>&quot;') // strings
                    .replace(/&lt;!--(.*?)--&gt;/g, '<span class="text-slate-500 italic">&lt;!--$1--&gt;</span>'); // comments

                highlighted += `
                    <div class="flex hover:bg-slate-800 rounded transition-colors whitespace-pre">
                        <span class="w-8 text-slate-500 select-none border-r border-slate-700 text-right pr-2 mr-3 shrink-0">${i + 1}</span>
                        <span>${formattedLine}</span>
                    </div>`;
            });
            return highlighted;
        }

        // Initialize App
        function initApp() {
            const tabsContainer = document.getElementById('tabs-container');
            
            programsData.forEach((prog, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === 0 ? 'active' : ''} shadow-sm`;
                btn.innerHTML = `<i class="fas ${prog.icon} mr-1"></i> ${prog.title}`;
                
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadProgram(index);
                };
                
                tabsContainer.appendChild(btn);
            });
            
            loadProgram(0);
        }

        // Load Content Safely
        function loadProgram(index) {
            activeIndex = index;
            const prog = programsData[index];
            
            document.getElementById('prog-title').innerHTML = `<i class="fas ${prog.icon} text-blue-500 mr-1"></i> ${prog.title}`;
            document.getElementById('prog-code').innerHTML = highlightHTML(prog.code);
            document.getElementById('prog-output').innerHTML = prog.output;
            document.getElementById('prog-expl').innerHTML = prog.expl;
            
            // Reset copy button
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.innerHTML = '<i class="fas fa-copy mr-1"></i> Copy Code';
            copyBtn.className = "bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-md text-xs font-bold transition flex items-center gap-2 shadow-sm";
            
            // Smooth scroll to top of content
            document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Copy functionality
        function copyCode() {
            const prog = programsData[activeIndex];
            const temp = document.createElement("textarea");
            temp.value = prog.code;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand("copy");
            document.body.removeChild(temp);
            
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = '<i class="fas fa-check-circle mr-1"></i> Copied!';
            btn.className = "bg-green-600 text-white px-4 py-1.5 rounded-md text-xs font-bold transition flex items-center gap-2 shadow-sm";
            
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-copy mr-1"></i> Copy Code';
                btn.className = "bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-md text-xs font-bold transition flex items-center gap-2 shadow-sm";
            }, 2000);
        }

        // Run
        window.onload = initApp;
    </script>
