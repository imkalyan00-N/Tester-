<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan's Smooth Proof</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f3ff;
            --pink: #ff00ea;
            --dark: #050510;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--dark);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none; /* Prevents mobile scrolling issues */
        }

        /* Optimized Background */
        #space-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0a25 0%, #000000 100%);
            z-index: 0;
        }

        /* Performance friendly stars using box-shadow instead of multiple DOM elements */
        .stars {
            width: 2px;
            height: 2px;
            background: transparent;
            position: absolute;
            z-index: 1;
            /* Star positions will be injected via JS for better performance */
        }

        /* Particle Canvas */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            /* Hardware acceleration for canvas container */
            transform: translateZ(0); 
            will-change: transform;
        }

        /* Optimized JARVIS HUD */
        .hud-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .hud-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            will-change: transform; /* Boosts CSS animation performance */
        }

        .circle-1 {
            width: 100%; height: 100%;
            border-top: 2px solid var(--cyan);
            border-bottom: 2px solid var(--cyan);
            animation: rotate 3s linear infinite;
        }

        .circle-2 {
            width: 80%; height: 80%;
            border-left: 2px dashed rgba(0, 243, 255, 0.5);
            border-right: 2px dashed rgba(0, 243, 255, 0.5);
            animation: rotate-reverse 4s linear infinite;
        }

        /* The Moon - Simplified Glow for Performance */
        .moon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100px; height: 100px;
            background: radial-gradient(circle at 30% 30%, #fff, #ccc 60%, #555 100%);
            border-radius: 50%;
            z-index: 4;
            opacity: 0;
            transition: opacity 1s ease;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            will-change: transform, opacity;
        }

        /* UI Elements */
        .ui-overlay {
            position: absolute;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px); /* Reduced blur for performance */
            transition: opacity 0.4s;
        }

        .start-btn {
            background: rgba(0, 243, 255, 0.1);
            color: var(--cyan);
            border: 2px solid var(--cyan);
            padding: 12px 25px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 900;
            transition: all 0.2s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .start-btn:active {
            transform: scale(0.95);
            background: var(--cyan);
            color: #000;
        }

        .status-text {
            position: absolute;
            bottom: 20%;
            font-size: 1rem;
            color: var(--cyan);
            letter-spacing: 1px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            width: 90%;
            left: 5%;
        }

        .final-message {
            position: absolute;
            top: 60%;
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: var(--pink);
            text-shadow: 0 0 10px var(--pink);
            opacity: 0;
            transition: opacity 1.5s ease;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        .kalyan-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: #fff;
            letter-spacing: 1px;
            margin-top: 15px;
            text-shadow: none;
        }

        /* Hardware Accelerated Animations */
        @keyframes rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes rotate-reverse {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        .moon-scanning {
            animation: pulse-glow 1.5s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px rgba(255,255,255,0.8); transform: translate(-50%, -50%) scale(1); }
            100% { box-shadow: 0 0 40px var(--cyan); transform: translate(-50%, -50%) scale(1.05); }
        }
    </style>
</head>
<body>

    <div id="space-bg">
        <div class="stars" id="stars-layer"></div>
    </div>

    <!-- Canvas for Smooth Particles -->
    <canvas id="particle-canvas"></canvas>

    <div class="hud-container" id="hud">
        <div class="hud-circle circle-1"></div>
        <div class="hud-circle circle-2"></div>
    </div>

    <div class="moon" id="moon"></div>

    <div class="ui-overlay" id="intro-ui">
        <h1 class="text-xl md:text-2xl mb-6 text-cyan-400 font-black tracking-widest text-center px-4">
            COSMIC TRUTH PROTOCOL
        </h1>
        <p class="text-gray-300 mb-8 text-center max-w-sm px-6 text-sm leading-relaxed">
            Keerthana, eppudaina aakasam vanka chusi alochinchava?<br><br>
            Nijam theluskovalante kinda nokku.
        </p>
        <button class="start-btn" onclick="initiateSequence()">Nijam Chudu</button>
    </div>

    <div class="status-text" id="status">System Ready...</div>

    <div class="final-message" id="final-msg">
        Nuvve na Chandamama! ❤️
        <div class="kalyan-tag">- Kalyan eppudu nijame chepthadu 😉</div>
    </div>

    <script>
        // --- 1. Performance Optimized Stars ---
        function generateStars() {
            let boxShadows = [];
            let w = window.innerWidth;
            let h = window.innerHeight;
            // Limit stars to 50 for performance on mobile
            for(let i = 0; i < 50; i++) {
                boxShadows.push(`${Math.floor(Math.random() * w)}px ${Math.floor(Math.random() * h)}px #ffffff`);
            }
            document.getElementById('stars-layer').style.boxShadow = boxShadows.join(', ');
        }
        generateStars();
        window.addEventListener('resize', generateStars);

        // --- 2. Highly Optimized Particle Engine ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // alpha: false boosts performance
        
        let w, h;
        const PARTICLE_COUNT = 800; // Fixed number of particles = NO LAG!
        let particles = [];
        let isAnimating = false;

        function resizeCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            // Draw background once if alpha is false
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, w, h);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class FastParticle {
            constructor() {
                this.x = w / 2;
                this.y = h / 2;
                this.targetX = w / 2;
                this.targetY = h / 2;
                this.color = '#00f3ff';
                this.size = w < 600 ? 1.5 : 2; // Slightly larger for visibility
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                // Pre-calculated physics constants
                this.friction = 0.88;
                this.spring = 0.08; 
            }

            update() {
                // Simplified physics for speed
                this.vx += (this.targetX - this.x) * this.spring;
                this.vy += (this.targetY - this.y) * this.spring;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size); // fillRect is much faster than arc
            }
        }

        // Initialize fixed pool of particles
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new FastParticle());
        }

        // Hidden canvas for text scanning (Smaller = Faster)
        const textCanvas = document.createElement('canvas');
        const textCtx = textCanvas.getContext('2d', { willReadFrequently: true });
        
        function getTargetsFromText(text, color) {
            // Use a fixed small canvas size for scanning to prevent mobile lag
            const tw = 600;
            const th = 200;
            textCanvas.width = tw;
            textCanvas.height = th;
            
            textCtx.clearRect(0, 0, tw, th);
            textCtx.fillStyle = '#fff';
            
            // Adjust font size based on screen width
            let fontSize = w < 400 ? 40 : (w < 600 ? 55 : 80);
            
            textCtx.font = `900 ${fontSize}px 'Orbitron'`;
            textCtx.textAlign = 'center';
            textCtx.textBaseline = 'middle';
            textCtx.fillText(text, tw / 2, th / 2);

            const imageData = textCtx.getImageData(0, 0, tw, th).data;
            let targets = [];
            
            // Scan with a gap to collect target points
            for (let y = 0; y < th; y += 3) {
                for (let x = 0; x < tw; x += 3) {
                    const index = (y * tw + x) * 4;
                    if (imageData[index + 3] > 128) { // If pixel is not transparent
                        // Map coordinates from small canvas to center of main screen
                        targets.push({
                            x: x - (tw / 2) + (w / 2),
                            y: y - (th / 2) + (h / 2) - 40 // Shifted slightly up
                        });
                    }
                }
            }

            // Randomize target assignments so particles criss-cross beautifully
            targets.sort(() => Math.random() - 0.5);

            // Assign targets to our fixed particle pool
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let p = particles[i];
                p.color = color;
                p.spring = 0.05 + Math.random() * 0.05; // Different speeds
                
                if (i < targets.length) {
                    p.targetX = targets[i].x;
                    p.targetY = targets[i].y;
                } else {
                    // If we have extra particles, assign them to random existing targets
                    let randomTarget = targets[Math.floor(Math.random() * targets.length)];
                    if(randomTarget) {
                        // Add slight offset so they don't perfectly overlap
                        p.targetX = randomTarget.x + (Math.random() - 0.5) * 4;
                        p.targetY = randomTarget.y + (Math.random() - 0.5) * 4;
                    }
                }
            }
        }

        // The animation loop
        function animate() {
            if (!isAnimating) return;
            
            // Fast clear screen technique for alpha:false
            ctx.fillStyle = 'rgba(5, 5, 16, 0.3)'; // Creates a trailing effect
            ctx.fillRect(0, 0, w, h);
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        function scatterParticles() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let p = particles[i];
                p.targetX = p.x + (Math.random() - 0.5) * w;
                p.targetY = p.y + (Math.random() - 0.5) * h;
                p.spring = 0.02; // Float away slowly
            }
        }

        // --- 3. Cinematic Sequence (Smooth Transitions) ---
        const introUi = document.getElementById('intro-ui');
        const moon = document.getElementById('moon');
        const hud = document.getElementById('hud');
        const statusEl = document.getElementById('status');
        const finalMsg = document.getElementById('final-msg');

        function updateStatus(text, color = "var(--cyan)") {
            statusEl.style.opacity = 0;
            setTimeout(() => {
                statusEl.innerText = text;
                statusEl.style.color = color;
                statusEl.style.opacity = 1;
            }, 300); // Faster text transitions
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function initiateSequence() {
            // 1. Hide Intro smoothly
            introUi.style.opacity = 0;
            await sleep(400);
            introUi.style.display = 'none';

            // 2. Show Moon & HUD
            moon.style.opacity = 1;
            hud.style.opacity = 1;
            updateStatus("Andhamaina daani kosam vethukuthunnam...");
            await sleep(2000);

            // 3. Scan Moon
            moon.classList.add('moon-scanning');
            updateStatus("Target dorikindi... Scanning CHANDAMAMA...");
            await sleep(2000);

            // 4. Transform to Text
            moon.style.opacity = 0;
            hud.style.opacity = 0;
            
            isAnimating = true;
            animate();
            
            updateStatus("Decrpyt chesthunnam...", "var(--cyan)");
            
            // Set particles to start from center (where moon was)
            particles.forEach(p => { p.x = w/2; p.y = h/2; });
            getTargetsFromText("CHANDAMAMA", "#00f3ff");
            
            await sleep(3000);

            // 5. Explode and Morph to KEERTHANA
            updateStatus("Magic processing... Nijam idhigo!", "#ff00ea");
            scatterParticles(); // Blow them away slightly
            await sleep(800);

            getTargetsFromText("KEERTHANA", "#ff00ea");
            await sleep(2500);

            // 6. Final Message
            statusEl.style.opacity = 0;
            finalMsg.style.opacity = 1;
            
            // Change particles to stars/hearts colors at the end
            particles.forEach(p => {
                if(Math.random() > 0.7) p.color = '#fff';
            });
        }
    </script>
</body>
</html>
