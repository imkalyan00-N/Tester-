<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan's Perfect Proof</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00e5ff;
            --pink: #d500f9; /* Matching the screenshot's purple/pink glow */
            --bg: #020205;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
            user-select: none;
        }

        /* Space Background */
        #space {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0b1a 0%, #010103 100%);
            z-index: 0;
        }

        /* Stars */
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 0.9; transform: scale(1.2); }
        }

        /* The Exact Match Moon & HUD Container */
        #moon-hud-container {
            position: absolute;
            top: 40%; /* Positioned slightly higher to make room for text */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; /* Hidden initially */
            transition: opacity 1s ease, transform 1s ease;
        }

        /* 1. Outer Cyan Ring */
        .ring-outer {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 4px solid var(--cyan);
            border-left-color: transparent;
            border-right-color: transparent;
            box-shadow: 0 0 15px var(--cyan), inset 0 0 10px var(--cyan);
            animation: spin 6s linear infinite;
        }

        /* 2. Middle Dashed Ring */
        .ring-middle {
            position: absolute;
            width: 82%; height: 82%;
            border-radius: 50%;
            border: 2px dashed rgba(0, 229, 255, 0.7);
            animation: spin-reverse 8s linear infinite;
        }

        /* 3. Inner Pink/Purple Ring */
        .ring-inner {
            position: absolute;
            width: 65%; height: 65%;
            border-radius: 50%;
            border: 3px solid var(--pink);
            border-top-color: transparent;
            border-bottom-color: transparent;
            box-shadow: 0 0 20px var(--pink), inset 0 0 15px var(--pink);
            animation: spin 4s linear infinite;
        }

        /* The Moon (Matching Screenshot EXACTLY) */
        .moon {
            position: absolute;
            width: 140px; height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #f8f8f8 0%, #dcdcdc 50%, #a0a0a0 100%);
            box-shadow: 
                0 0 40px rgba(255, 255, 255, 0.2), /* Subtle outer glow */
                inset -10px -10px 20px rgba(0,0,0,0.4); /* 3D volume shadow */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* Moon Craters */
        .crater-1 {
            position: absolute;
            width: 25px; height: 25px;
            top: 25%; left: 30%;
            border-radius: 50%;
            background: #b0b0b0;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.3), 1px 1px 2px rgba(255,255,255,0.6);
        }

        .crater-2 {
            position: absolute;
            width: 35px; height: 35px;
            bottom: 25%; right: 25%;
            border-radius: 50%;
            background: #b0b0b0;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.3), 1px 1px 2px rgba(255,255,255,0.6);
        }

        /* Screenshot Text Style */
        .screenshot-text {
            position: absolute;
            top: 68%; /* Below the moon */
            width: 90%;
            text-align: center;
            font-size: 1.2rem;
            color: var(--cyan);
            text-shadow: 0 0 12px var(--cyan);
            letter-spacing: 2px;
            line-height: 1.6;
            opacity: 0; /* Hidden initially */
            transition: opacity 0.5s ease;
            z-index: 15;
            font-weight: 500;
        }

        /* Particle Canvas for Morphing */
        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 20;
            pointer-events: none;
            display: none; /* Hidden until magic starts */
        }

        /* UI Overlays */
        #intro-ui {
            position: absolute;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%; height: 100%;
            background: rgba(2, 2, 5, 0.85);
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease;
        }

        .start-btn {
            background: rgba(0, 229, 255, 0.1);
            color: var(--cyan);
            border: 2px solid var(--cyan);
            padding: 12px 35px;
            font-size: 1.3rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
            transition: all 0.3s ease;
        }

        .start-btn:active {
            background: var(--cyan);
            color: #000;
            transform: scale(0.95);
        }

        /* Final Romantic Text */
        #final-message {
            position: absolute;
            top: 60%;
            width: 100%;
            text-align: center;
            opacity: 0;
            z-index: 25;
            transition: opacity 2s ease;
            pointer-events: none;
        }

        .romantic-font {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: var(--pink);
            text-shadow: 0 0 15px var(--pink), 0 0 30px #fff;
            margin-bottom: 10px;
        }

        .tag-font {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: #ccc;
            letter-spacing: 2px;
        }

        /* Animations */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        
        .pulse-effect {
            animation: pulse-glow 1.5s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
            100% { transform: translate(-50%, -50%) scale(1.05); filter: brightness(1.2); }
        }

    </style>
</head>
<body>

    <!-- Stars Background -->
    <div id="space"></div>

    <!-- The Exact Moon & HUD from Screenshot -->
    <div id="moon-hud-container">
        <div class="ring-outer"></div>
        <div class="ring-middle"></div>
        <div class="ring-inner"></div>
        <div class="moon">
            <div class="crater-1"></div>
            <div class="crater-2"></div>
        </div>
    </div>

    <!-- The Text from Screenshot -->
    <div class="screenshot-text" id="status-text">
        Prapancham lo athi<br>
        andhamaina daani kosam<br>
        vethukuthunnam...
    </div>

    <!-- Zero-Lag Particle Canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- Intro Button -->
    <div id="intro-ui">
        <h2 style="color: var(--cyan); margin-bottom: 30px; letter-spacing: 3px; font-size: 1.5rem; text-align:center;">COSMIC PROOF</h2>
        <button class="start-btn" onclick="startSequence()">START</button>
    </div>

    <!-- Final Message -->
    <div id="final-message">
        <div class="romantic-font">Nuvve na Chandamama! ❤️</div>
        <div class="tag-font">- Kalyan eppudu nijame chepthadu 😉</div>
    </div>

    <script>
        // --- 1. Background Stars ---
        const space = document.getElementById('space');
        const starCount = window.innerWidth < 600 ? 60 : 100;
        for(let i=0; i<starCount; i++){
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            let size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${Math.random() * 3 + 1}s`);
            space.appendChild(star);
        }

        // --- 2. Ultra-Smooth Particle Engine ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // High performance
        let w, h;
        const PARTICLE_COUNT = window.innerWidth < 600 ? 700 : 1200;
        let particles = [];
        let isAnimating = false;
        let currentColor = '#00e5ff';

        function resizeCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            if(isAnimating) {
                ctx.fillStyle = '#020205';
                ctx.fillRect(0, 0, w, h);
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                // Start from center exactly where moon is
                this.x = w / 2;
                this.y = h * 0.4; 
                this.targetX = this.x;
                this.targetY = this.y;
                this.size = w < 500 ? 1.5 : 2;
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
                this.friction = 0.88; // Smooth flow
                this.ease = 0.08;
            }

            update() {
                this.vx += (this.targetX - this.x) * this.ease;
                this.vy += (this.targetY - this.y) * this.ease;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        // Init particle pool
        for(let i=0; i<PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        const tCanvas = document.createElement('canvas');
        const tCtx = tCanvas.getContext('2d', { willReadFrequently: true });

        function extractText(text) {
            const tw = 800;
            const th = 300;
            tCanvas.width = tw;
            tCanvas.height = th;
            tCtx.clearRect(0, 0, tw, th);
            
            let fontSize = w < 400 ? 45 : (w < 600 ? 60 : 90);
            tCtx.font = `900 ${fontSize}px 'Orbitron'`;
            tCtx.fillStyle = '#fff';
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillText(text, tw/2, th/2);

            const pixels = tCtx.getImageData(0, 0, tw, th).data;
            let points = [];
            let step = w < 600 ? 3 : 4; 

            for(let y = 0; y < th; y += step) {
                for(let x = 0; x < tw; x += step) {
                    if(pixels[(y * tw + x) * 4 + 3] > 100) {
                        points.push({
                            x: x - (tw/2) + (w/2),
                            y: y - (th/2) + (h/2) - 40 // Centered
                        });
                    }
                }
            }

            points.sort(() => Math.random() - 0.5);

            for(let i=0; i<PARTICLE_COUNT; i++) {
                let p = particles[i];
                p.ease = 0.04 + Math.random() * 0.06;
                if(i < points.length) {
                    p.targetX = points[i].x;
                    p.targetY = points[i].y;
                } else {
                    let r = points[Math.floor(Math.random() * points.length)];
                    if(r) {
                        p.targetX = r.x + (Math.random() - 0.5) * 15;
                        p.targetY = r.y + (Math.random() - 0.5) * 15;
                    }
                }
            }
        }

        function explode() {
            particles.forEach(p => {
                p.targetX = p.x + (Math.random() - 0.5) * w * 1.5;
                p.targetY = p.y + (Math.random() - 0.5) * h * 1.5;
                p.ease = 0.02;
            });
        }

        function animate() {
            if(!isAnimating) return;
            
            // Premium motion blur
            ctx.fillStyle = 'rgba(2, 2, 5, 0.35)';
            ctx.fillRect(0, 0, w, h);
            
            ctx.fillStyle = currentColor;
            
            particles.forEach(p => {
                p.update();
                // Zero-lag rendering using bitwise operator ~~
                ctx.fillRect(~~p.x, ~~p.y, p.size, p.size); 
            });
            
            requestAnimationFrame(animate);
        }

        // --- 3. Sequence Controller ---
        const introUi = document.getElementById('intro-ui');
        const moonHud = document.getElementById('moon-hud-container');
        const statusText = document.getElementById('status-text');
        const canvasEl = document.getElementById('particle-canvas');
        const finalMsg = document.getElementById('final-message');

        const sleep = ms => new Promise(res => setTimeout(res, ms));

        function changeText(newText, color = "var(--cyan)") {
            statusText.style.opacity = 0;
            setTimeout(() => {
                statusText.innerHTML = newText;
                statusText.style.color = color;
                statusText.style.textShadow = `0 0 12px ${color}`;
                statusText.style.opacity = 1;
            }, 500);
        }

        async function startSequence() {
            // 1. Hide Intro Button
            introUi.style.opacity = 0;
            await sleep(500);
            introUi.style.display = 'none';

            // 2. Show Exactly matching Moon, Rings & Text
            moonHud.style.opacity = 1;
            statusText.style.opacity = 1; // Text from screenshot appears
            
            await sleep(3500);

            // 3. Scanning Effect
            moonHud.classList.add('pulse-effect');
            changeText("Target Locked:<br>CHANDAMAMA", "#fff");
            
            await sleep(2500);

            // 4. Fade out Moon & Prepare Magic
            changeText("Decrypting Cosmic Data...", "var(--cyan)");
            moonHud.style.transform = 'translate(-50%, -50%) scale(0.2)';
            moonHud.style.opacity = 0;
            
            await sleep(600);

            // Hide status text & start Canvas
            statusText.style.opacity = 0;
            canvasEl.style.display = 'block';
            isAnimating = true;
            resizeCanvas(); // Set background
            animate();

            // 5. Morph into CHANDAMAMA
            currentColor = '#00e5ff';
            extractText("CHANDAMAMA");
            
            await sleep(3500);

            // 6. Explode & Morph to KEERTHANA
            explode();
            await sleep(800);
            
            currentColor = '#d500f9'; // Pink/Purple
            extractText("KEERTHANA");
            
            await sleep(3500);

            // 7. Show Final Message & Sparkle Particles
            finalMsg.style.opacity = 1;
            
            setInterval(() => {
                currentColor = Math.random() > 0.6 ? '#d500f9' : '#fff';
            }, 500);
        }
    </script>
</body>
</html>
