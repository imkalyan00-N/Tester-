<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan's Premium Proof for Keerthana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f3ff;
            --pink: #ff00ea;
            --dark: #03030b;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--dark);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* Deep Cosmic Background - Hardware Accelerated */
        #space-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0b1a 0%, #020205 100%);
            z-index: 0;
            transform: translateZ(0); 
        }

        /* Zero-Lag Starry Background */
        #stars-container {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 1;
            transform: translateZ(0);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            will-change: opacity, transform;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.5) translateZ(0); }
            100% { opacity: 0.8; transform: scale(1.2) translateZ(0); }
        }

        /* Advanced Realistic Moon - Optimized for Zero Lag */
        .moon-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, opacity;
        }

        .moon {
            width: 140px; height: 140px;
            border-radius: 50%;
            /* Realistic moon gradient with craters - no heavy box shadows inside animation */
            background: 
                radial-gradient(circle at 30% 50%, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.1) 10%, transparent 12%),
                radial-gradient(circle at 65% 35%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.1) 12%, transparent 15%),
                radial-gradient(circle at 60% 70%, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.05) 15%, transparent 18%),
                radial-gradient(circle at 30% 30%, #ffffff 0%, #e6e6e6 30%, #cccccc 60%, #8c8c8c 100%);
            box-shadow: 
                inset -15px -15px 25px rgba(0,0,0,0.6),
                inset 5px 5px 15px rgba(255,255,255,0.8),
                0 0 30px rgba(0, 243, 255, 0.3);
            position: relative;
        }

        /* Using pseudo element for glow prevents lag during animation */
        .moon::after {
            content: '';
            position: absolute;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.2) 0%, transparent 70%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
            will-change: opacity, transform;
        }

        /* JARVIS HUD Rings - Hardware Accelerated */
        .hud-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 260px; height: 260px;
            z-index: 5;
            opacity: 0;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .hud-ring {
            position: absolute;
            top: 50%; left: 50%;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            will-change: transform;
        }

        .ring-1 {
            width: 100%; height: 100%;
            border: 2px solid transparent;
            border-top: 2px solid var(--cyan);
            border-bottom: 2px solid var(--cyan);
            animation: spin 4s linear infinite;
        }

        .ring-2 {
            width: 85%; height: 85%;
            border: 2px dashed rgba(0, 243, 255, 0.6);
            animation: spin-reverse 6s linear infinite;
        }

        .ring-3 {
            width: 115%; height: 115%;
            border: 1px dotted var(--pink);
            animation: spin 10s linear infinite;
            opacity: 0.5;
        }

        /* Particle Canvas - Premium rendering */
        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            transform: translateZ(0); /* Force GPU */
        }

        /* UI Overlays */
        .ui-layer {
            position: absolute;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            background: rgba(3, 3, 11, 0.7);
            backdrop-filter: blur(5px);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glitch-title {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.8);
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-align: center;
        }

        .start-btn {
            background: rgba(0, 243, 255, 0.05);
            color: var(--cyan);
            border: 2px solid var(--cyan);
            padding: 12px 30px;
            font-size: 1.2rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .start-btn:active {
            background: var(--cyan);
            color: #000;
            transform: scale(0.95);
        }

        .system-status {
            position: absolute;
            bottom: 15%;
            font-size: 1.1rem;
            color: var(--cyan);
            letter-spacing: 2px;
            text-align: center;
            width: 100%;
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 700;
        }

        .romantic-text {
            position: absolute;
            top: 65%;
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: var(--pink);
            text-shadow: 0 0 15px rgba(255, 0, 234, 0.8);
            opacity: 0;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        /* Animations */
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: translate(-50%, -50%) rotate(-360deg); } }
        
        /* Optimized pulse scan that doesn't drop frames */
        .pulse-scan {
            animation: pulse-scale 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        }
        .pulse-scan .moon::after {
            opacity: 1;
            transform: scale(1.3);
        }

        @keyframes pulse-scale {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.05); }
        }
    </style>
</head>
<body>

    <!-- Space Background with Stars -->
    <div id="space-bg"></div>
    <div id="stars-container"></div>

    <!-- Smooth Particle Canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- JARVIS HUD -->
    <div class="hud-container" id="hud">
        <div class="hud-ring ring-1"></div>
        <div class="hud-ring ring-2"></div>
        <div class="hud-ring ring-3"></div>
    </div>

    <!-- The Realistic Moon -->
    <div class="moon-container" id="moon-wrapper">
        <div class="moon"></div>
    </div>

    <!-- Start UI -->
    <div class="ui-layer" id="intro-screen">
        <div class="glitch-title">COSMIC MATCH SYSTEM</div>
        <p class="text-gray-300 text-center max-w-xs mb-8 text-sm leading-relaxed">
            Keerthana, eppudaina aakasam vanka chusi aalochinchava?<br><br>
            Nijam theluskovalante scan start chey.
        </p>
        <button class="start-btn" onclick="startMagic()">Scan Start</button>
    </div>

    <!-- Dynamic Status Text -->
    <div class="system-status" id="status-text">System Ready...</div>

    <!-- Final Romantic Reveal -->
    <div class="romantic-text" id="final-message">
        Nuvve na Chandamama! ❤️<br>
        <span style="font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: #fff; letter-spacing: 1px; text-shadow: none; display: block; margin-top: 10px;">- Kalyan eppudu nijame chepthadu 😉</span>
    </div>

    <script>
        // --- 1. Generate Lag-Free Stars ---
        const starsContainer = document.getElementById('stars-container');
        // Reduce count slightly for mobile performance
        const starCount = window.innerWidth < 600 ? 50 : 80;
        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            let size = Math.random() * 2 + 0.5;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${Math.random() * 3 + 1.5}s`);
            starsContainer.appendChild(star);
        }

        // --- 2. High-Performance Particle Engine (Premium Smoothness) ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true }); // Max performance flags

        let w, h;
        // Dynamically adjust particles based on screen size so mobile never lags
        const PARTICLE_COUNT = window.innerWidth < 600 ? 600 : 1000; 
        let particles = [];
        let isAnimating = false;
        let currentColor = '#00f3ff';

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            ctx.fillStyle = '#03030b'; 
            ctx.fillRect(0, 0, w, h);
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = w / 2;
                this.y = h / 2;
                this.targetX = w / 2;
                this.targetY = h / 2;
                this.size = w < 500 ? 1.5 : 2;
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
                this.friction = 0.88; // Premium flow friction
                this.spring = 0.08;
            }

            update() {
                // Smooth easing physics
                this.vx += (this.targetX - this.x) * this.spring;
                this.vy += (this.targetY - this.y) * this.spring;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        const textCanvas = document.createElement('canvas');
        const textCtx = textCanvas.getContext('2d', { willReadFrequently: true });
        
        function extractTextTargets(text) {
            const tw = 800;
            const th = 300;
            textCanvas.width = tw;
            textCanvas.height = th;
            
            textCtx.clearRect(0, 0, tw, th);
            textCtx.fillStyle = '#fff';
            
            let fontSize = w < 400 ? 45 : (w < 600 ? 55 : 90);
            
            textCtx.font = `900 ${fontSize}px 'Orbitron'`;
            textCtx.textAlign = 'center';
            textCtx.textBaseline = 'middle';
            textCtx.fillText(text, tw / 2, th / 2);

            const pixels = textCtx.getImageData(0, 0, tw, th).data;
            let targets = [];
            
            let step = w < 600 ? 4 : 4; // Optimized pixel sampling
            
            for (let y = 0; y < th; y += step) {
                for (let x = 0; x < tw; x += step) {
                    const idx = (y * tw + x) * 4;
                    if (pixels[idx + 3] > 100) {
                        targets.push({
                            x: x - (tw / 2) + (w / 2),
                            y: y - (th / 2) + (h / 2) - 30
                        });
                    }
                }
            }

            targets.sort(() => Math.random() - 0.5);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let p = particles[i];
                p.spring = 0.04 + Math.random() * 0.06;
                
                if (i < targets.length) {
                    p.targetX = targets[i].x;
                    p.targetY = targets[i].y;
                } else {
                    let randomTarget = targets[Math.floor(Math.random() * targets.length)];
                    if(randomTarget) {
                        p.targetX = randomTarget.x + (Math.random() - 0.5) * 15;
                        p.targetY = randomTarget.y + (Math.random() - 0.5) * 15;
                    }
                }
            }
        }

        function renderParticles() {
            if (!isAnimating) return;
            
            // Fast premium motion blur
            ctx.fillStyle = 'rgba(3, 3, 11, 0.35)'; 
            ctx.fillRect(0, 0, w, h);
            
            ctx.fillStyle = currentColor;
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let p = particles[i];
                p.update();
                // Bitwise floor (~~) is the fastest way to render on canvas (Zero sub-pixel lag)
                ctx.fillRect(~~p.x, ~~p.y, p.size, p.size);
            }
            
            requestAnimationFrame(renderParticles);
        }

        function explodeParticles() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let p = particles[i];
                p.targetX = p.x + (Math.random() - 0.5) * w * 1.5;
                p.targetY = p.y + (Math.random() - 0.5) * h * 1.5;
                p.spring = 0.025; 
            }
        }

        // --- 3. Cinematic Sequence Controller ---
        const introScreen = document.getElementById('intro-screen');
        const moonWrapper = document.getElementById('moon-wrapper');
        const hud = document.getElementById('hud');
        const statusText = document.getElementById('status-text');
        const finalMessage = document.getElementById('final-message');

        const sleep = ms => new Promise(res => setTimeout(res, ms));

        function setStatus(text, color = "var(--cyan)") {
            statusText.style.opacity = 0;
            setTimeout(() => {
                statusText.innerText = text;
                statusText.style.color = color;
                statusText.style.opacity = 1;
            }, 300);
        }

        async function startMagic() {
            // 1. Fade out UI smoothly
            introScreen.style.opacity = 0;
            await sleep(600);
            introScreen.style.display = 'none';

            // 2. Reveal Moon & HUD
            moonWrapper.style.opacity = 1;
            hud.style.opacity = 1;
            setStatus("Aakasam lo vethukuthunnam...");
            await sleep(2500);

            // 3. Scanning Phase
            moonWrapper.classList.add('pulse-scan');
            setStatus("Target Locked: CHANDAMAMA", "#fff");
            await sleep(2500);

            // 4. Moon dissolves into text
            setStatus("Chandamama gundello emundo decrypt chesthunnam...", "var(--cyan)");
            
            moonWrapper.style.opacity = 0;
            hud.style.opacity = 0;
            moonWrapper.style.transform = 'translate(-50%, -50%) scale(0.6)';
            
            // Slight delay before magic particles appear feels more premium
            await sleep(400); 
            
            isAnimating = true;
            renderParticles();
            
            currentColor = '#00f3ff';
            extractTextTargets("CHANDAMAMA");
            
            await sleep(4000);

            // 5. Explode and Morph
            setStatus("Cosmic Magic Processing...", "var(--pink)");
            explodeParticles(); 
            
            await sleep(800);

            currentColor = '#ff00ea';
            extractTextTargets("KEERTHANA");
            
            await sleep(3500);

            // 6. Reveal Final Romantic Text
            statusText.style.opacity = 0;
            finalMessage.style.opacity = 1;
            
            setInterval(() => {
                currentColor = Math.random() > 0.6 ? '#ff00ea' : '#fff';
            }, 600);
        }
    </script>
</body>
</html>
