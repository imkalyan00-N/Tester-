<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan's Proof for Keerthana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Base styles for the Marvel/Sci-Fi look */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            color: #0ff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Magical Particle Canvas */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Main UI Container */
        .ui-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            background: rgba(0, 10, 20, 0.6);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.1);
            max-width: 90%;
            width: 400px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }

        .glowing-text {
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff;
        }

        .love-glow {
            color: #ff007f;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f;
        }

        /* Start Button */
        .btn {
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
        }

        /* Hidden initially */
        .hidden-element {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Scramble text styling */
        #scramble-text {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin: 20px 0;
            min-height: 60px;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }
            50% { transform: scale(1.02); box-shadow: 0 0 40px rgba(0, 255, 255, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }
        }

        .pulse-active {
            animation: pulse 2s infinite;
        }

        .success-border {
            border-color: #ff007f !important;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5), inset 0 0 20px rgba(255, 0, 127, 0.2) !important;
        }
    </style>
</head>
<body>

    <!-- Particle Background -->
    <canvas id="canvas-container"></canvas>

    <!-- Main UI -->
    <div class="ui-container pulse-active" id="main-ui">
        
        <!-- Intro Screen -->
        <div id="intro-screen">
            <h1 class="text-xl mb-4 text-gray-300">JARVIS System Online</h1>
            <p class="text-sm mb-6">Keerthana gari kosam "Chandamama" match proof ready ga undi.</p>
            <button class="btn" onclick="startProofSequence()">Proof Chudu</button>
        </div>

        <!-- Animation Screen -->
        <div id="animation-screen" class="hidden-element w-full">
            <div id="status-text" class="text-sm text-yellow-400 mb-2 uppercase tracking-widest">Initializing...</div>
            
            <!-- Progress Bar -->
            <div class="w-full bg-gray-800 rounded-full h-1.5 mb-6 overflow-hidden">
              <div id="progress-bar" class="bg-cyan-400 h-1.5 rounded-full" style="width: 0%; transition: width 0.5s ease;"></div>
            </div>

            <div id="scramble-text" class="glowing-text">CHANDAMAMA</div>
            
            <div id="sub-status" class="text-xs text-gray-400 mt-4">Cosmic alignment check chesthunnam...</div>
        </div>

        <!-- Final Screen -->
        <div id="final-screen" class="hidden-element w-full flex flex-col items-center">
            <h2 class="text-3xl font-bold love-glow mb-4 uppercase tracking-widest">KEERTHANA</h2>
            <div class="text-green-400 text-lg mb-2 font-bold">100% Match Found!</div>
            <p class="text-white text-sm mb-4 leading-relaxed">
                Science prakaram, magic prakaram... <br>
                <span class="text-cyan-300 font-bold">Chandamama = Keerthana</span><br>
                Rendu names match ayyay!<br>
                Kalyan cheppinde nijam 😉
            </p>
            <div class="text-2xl">🌙 ❤️ ✨</div>
        </div>

    </div>

    <script>
        // --- 1. Background Magic Particles (Sci-Fi / Space vibe) ---
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        const numberOfParticles = 100;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- 2. JARVIS / Marvel Decryption Logic ---
        
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        
        function showElement(id) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            setTimeout(() => el.style.opacity = '1', 50);
        }

        function hideElement(id) {
            const el = document.getElementById(id);
            el.style.opacity = '0';
            setTimeout(() => el.style.display = 'none', 500);
        }

        async function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // The hacker effect function
        function scrambleText(element, finalWord, duration) {
            return new Promise((resolve) => {
                let iteration = 0;
                let interval = setInterval(() => {
                    element.innerText = element.innerText
                        .split("")
                        .map((letter, index) => {
                            if (index < iteration) {
                                return finalWord[index] || "";
                            }
                            return letters[Math.floor(Math.random() * letters.length)];
                        })
                        .join("");
                    
                    if (iteration >= Math.max(finalWord.length, element.innerText.length)) {
                        clearInterval(interval);
                        element.innerText = finalWord; // Ensure final word is set
                        resolve();
                    }
                    
                    iteration += 1 / 3; // Speed of deciphering
                }, 30);
            });
        }

        // --- 3. The Sequence Event ---
        async function startProofSequence() {
            // Hide Intro, Show Animation
            hideElement('intro-screen');
            await sleep(500);
            showElement('animation-screen');

            const status = document.getElementById('status-text');
            const subStatus = document.getElementById('sub-status');
            const scrambleEl = document.getElementById('scramble-text');
            const progress = document.getElementById('progress-bar');
            const mainUi = document.getElementById('main-ui');

            // Step 1: Scanning
            status.innerText = "Scanning Target...";
            subStatus.innerText = "Word structure ni analyze chesthunnam...";
            progress.style.width = "25%";
            await sleep(1500);

            // Step 2: Hacking / Decrypting
            status.innerText = "Decrypting Cosmic Data...";
            subStatus.innerText = "Letters match avuthunnayi... wait chey...";
            status.classList.add('text-red-400');
            progress.style.width = "60%";
            
            // Start scramble effect (Chandamama -> Keerthana)
            await scrambleText(scrambleEl, "KEERTHANA", 3000);
            
            // Step 3: Processing Result
            progress.style.width = "100%";
            status.innerText = "Decryption Complete!";
            status.classList.replace('text-red-400', 'text-green-400');
            subStatus.innerText = "Proof generated successfully.";
            scrambleEl.classList.remove('text-cyan-400');
            scrambleEl.classList.add('love-glow');
            await sleep(1000);

            // Step 4: Final Reveal
            hideElement('animation-screen');
            await sleep(500);
            mainUi.classList.add('success-border'); // Change border color to pinkish
            showElement('final-screen');
            
            // Add some magic visual flair
            createConfetti();
        }

        // --- 4. Extra Magic (Confetti/Sparks at the end) ---
        function createConfetti() {
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    spark.style.position = 'absolute';
                    spark.style.left = '50%';
                    spark.style.top = '50%';
                    spark.style.width = '5px';
                    spark.style.height = '5px';
                    spark.style.background = Math.random() > 0.5 ? '#0ff' : '#ff007f';
                    spark.style.borderRadius = '50%';
                    spark.style.boxShadow = `0 0 10px ${spark.style.background}`;
                    spark.style.pointerEvents = 'none';
                    spark.style.zIndex = '100';
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 5 + Math.random() * 5;
                    const vx = Math.cos(angle) * velocity;
                    const vy = Math.sin(angle) * velocity;
                    
                    document.body.appendChild(spark);
                    
                    let opacity = 1;
                    let x = window.innerWidth / 2;
                    let y = window.innerHeight / 2;
                    
                    const sparkAnim = setInterval(() => {
                        x += vx;
                        y += vy;
                        opacity -= 0.02;
                        spark.style.left = x + 'px';
                        spark.style.top = y + 'px';
                        spark.style.opacity = opacity;
                        
                        if(opacity <= 0) {
                            clearInterval(sparkAnim);
                            spark.remove();
                        }
                    }, 16);
                }, i * 20);
            }
        }
    </script>
</body>
</html>
