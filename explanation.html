<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan's Masterpiece Proof</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00e5ff;
            --pink: #ff00ea;
            --bg: #010105;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        /* 1. Epic Space Background */
        #space {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #050514 0%, #000000 100%);
            z-index: 0;
        }

        /* 2. Particle Canvas */
        #canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* 3. The Animated 3D Chandamama */
        #moon-container {
            position: absolute;
            z-index: 5;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .moon {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            background: #e0e0e0;
            box-shadow: 
                inset -25px -25px 40px rgba(0,0,0,0.9), /* 3D Shadow */
                inset 10px 10px 30px rgba(255,255,255,0.8), /* 3D Highlight */
                0 0 50px rgba(0, 229, 255, 0.4); /* Outer Glow */
            transform-style: preserve-3d;
            animation: moon-float 4s ease-in-out infinite alternate;
        }

        /* Animated Moon Surface/Craters to simulate rotation */
        .moon::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                radial-gradient(circle at 40% 40%, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.2) 10%, transparent 15%),
                radial-gradient(circle at 60% 70%, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.25) 12%, transparent 20%),
                radial-gradient(circle at 70% 30%, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.2) 8%, transparent 12%),
                radial-gradient(circle at 20% 60%, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.15) 10%, transparent 15%);
            background-size: 150px 150px;
            animation: moon-rotate 15s linear infinite;
        }

        /* Sci-Fi Scanning Laser */
        .scanner-laser {
            position: absolute;
            width: 120%;
            height: 3px;
            background: var(--cyan);
            left: -10%;
            box-shadow: 0 0 15px var(--cyan), 0 0 30px var(--cyan);
            animation: scan-moon 3s linear infinite;
            display: none;
            z-index: 10;
        }

        /* Rotating HUD Rings */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            box-sizing: border-box;
        }
        .ring-1 {
            width: 240px; height: 240px;
            border-top: 2px solid var(--cyan);
            border-bottom: 2px solid var(--cyan);
            animation: spin 3s linear infinite;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }
        .ring-2 {
            width: 270px; height: 270px;
            border-left: 2px dashed var(--pink);
            border-right: 2px dashed var(--pink);
            animation: spin-reverse 5s linear infinite;
        }
        .ring-3 {
            width: 300px; height: 300px;
            border: 1px dotted rgba(255, 255, 255, 0.5);
            animation: spin 10s linear infinite;
        }

        /* 4. UI Elements */
        #ui-container {
            position: absolute;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(1, 1, 5, 0.6);
            backdrop-filter: blur(8px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        h1 {
            font-size: 24px;
            color: var(--cyan);
            text-shadow: 0 0 15px var(--cyan);
            letter-spacing: 4px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        p {
            font-family: sans-serif;
            color: #aaa;
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            background: transparent;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            padding: 15px 40px;
            border: 2px solid var(--cyan);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .btn:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 30px var(--cyan);
            transform: scale(1.05);
        }

        #status-text {
            position: absolute;
            bottom: 10%;
            font-size: 18px;
            color: var(--cyan);
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--cyan);
            opacity: 0;
            transition: opacity 0.3s;
            text-align: center;
            width: 100%;
            z-index: 15;
        }

        #final-msg {
            position: absolute;
            top: 60%;
            width: 100%;
            text-align: center;
            opacity: 0;
            z-index: 20;
            transition: opacity 2s ease;
            pointer-events: none;
        }

        #final-msg .romantic {
            font-family: 'Great Vibes', cursive;
            font-size: 45px;
            color: var(--pink);
            text-shadow: 0 0 20px var(--pink), 0 0 40px #fff;
            margin-bottom: 10px;
        }

        #final-msg .kalyan {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: #fff;
            letter-spacing: 2px;
        }

        /* Animations */
        @keyframes moon-rotate {
            0% { transform: rotate(0deg) translate(-20px, -20px); }
            100% { transform: rotate(360deg) translate(-20px, -20px); }
        }
        @keyframes moon-float {
            0% { transform: translateY(-10px); }
            100% { transform: translateY(10px); }
        }
        @keyframes scan-moon {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

    </style>
</head>
<body>

    <div id="space"></div>
    <canvas id="canvas"></canvas>

    <!-- The Animated Moon -->
    <div id="moon-container">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="moon" id="the-moon">
            <div class="scanner-laser" id="laser"></div>
        </div>
    </div>

    <!-- Interface -->
    <div id="ui-container">
        <h1>VFX Match Protocol</h1>
        <p>Keerthana, eppudaina aakasam vanka chusi aalochinchava?<br>Ee magic chudu, nijam thelusthundi.</p>
        <button class="btn" onclick="startSequence()">Proof Chudu</button>
    </div>

    <div id="status-text">Initializing Systems...</div>

    <div id="final-msg">
        <div class="romantic">Nuvve na Chandamama! ❤️</div>
        <div class="kalyan">- Kalyan eppudu nijame chepthadu 😉</div>
    </div>

    <script>
        // --- 1. Background Stars ---
        const space = document.getElementById('space');
        for(let i=0; i<100; i++){
            let star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            let size = Math.random() * 2;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.background = '#fff';
            star.style.borderRadius = '50%';
            star.style.opacity = Math.random();
            space.appendChild(star);
        }

        // --- 2. Advanced Particle Physics Engine ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let w, h;
        let particles = [];
        let isAnimating = false;
        
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.targetX = x;
                this.targetY = y;
                this.color = color;
                this.radius = Math.random() * 1.5 + 1;
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
                this.friction = Math.random() * 0.04 + 0.88; // Organic movement
                this.ease = Math.random() * 0.05 + 0.04;
            }

            update() {
                let dx = this.targetX - this.x;
                let dy = this.targetY - this.y;
                
                this.vx += dx * this.ease;
                this.vy += dy * this.ease;
                this.vx *= this.friction;
                this.vy *= this.friction;
                
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Hidden canvas to extract text pixels perfectly
        const tCanvas = document.createElement('canvas');
        const tCtx = tCanvas.getContext('2d', { willReadFrequently: true });

        function getPoints(text) {
            tCanvas.width = w;
            tCanvas.height = h;
            tCtx.clearRect(0, 0, w, h);
            
            // Adjust size based on mobile or PC
            let fontSize = w < 500 ? 40 : 80;
            tCtx.font = `900 ${fontSize}px 'Orbitron', sans-serif`;
            tCtx.fillStyle = '#fff';
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillText(text, w/2, h/2);

            let data = tCtx.getImageData(0, 0, w, h).data;
            let points = [];
            // Step defines particle density
            let step = w < 500 ? 3 : 4; 

            for(let y = 0; y < h; y += step) {
                for(let x = 0; x < w; x += step) {
                    if(data[(y * w + x) * 4 + 3] > 128) {
                        points.push({x: x, y: y});
                    }
                }
            }
            // Shuffle to make formation look magical
            return points.sort(() => Math.random() - 0.5);
        }

        function formText(text, color) {
            let points = getPoints(text);
            
            // If we don't have particles, create them from center (moon explosion)
            if(particles.length === 0) {
                for(let i=0; i < points.length; i++) {
                    particles.push(new Particle(w/2, h/2, color));
                }
            } 
            // If we have particles, adjust array size and assign new targets
            else {
                // Add more if needed
                while(particles.length < points.length) {
                    particles.push(new Particle(w/2, h/2, color));
                }
                // Update targets
                for(let i=0; i < particles.length; i++) {
                    particles[i].color = color;
                    if(i < points.length) {
                        particles[i].targetX = points[i].x;
                        particles[i].targetY = points[i].y;
                    } else {
                        // Extra particles float away
                        particles[i].targetX = Math.random() * w;
                        particles[i].targetY = Math.random() * h;
                    }
                }
            }
        }

        function explode() {
            particles.forEach(p => {
                p.targetX = p.x + (Math.random() - 0.5) * w * 1.5;
                p.targetY = p.y + (Math.random() - 0.5) * h * 1.5;
            });
        }

        function animate() {
            if(!isAnimating) return;
            // Cinematic motion blur
            ctx.fillStyle = 'rgba(1, 1, 5, 0.25)';
            ctx.fillRect(0, 0, w, h);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        // --- 3. Sequence Controller ---
        const ui = document.getElementById('ui-container');
        const moonContainer = document.getElementById('moon-container');
        const laser = document.getElementById('laser');
        const status = document.getElementById('status-text');
        const finalMsg = document.getElementById('final-msg');

        const wait = ms => new Promise(res => setTimeout(res, ms));

        function setMsg(txt, color = "var(--cyan)") {
            status.style.opacity = 0;
            setTimeout(() => {
                status.innerText = txt;
                status.style.color = color;
                status.style.textShadow = `0 0 15px ${color}`;
                status.style.opacity = 1;
            }, 300);
        }

        async function startSequence() {
            // 1. Hide UI, Bring in Moon
            ui.style.transform = 'scale(0.8)';
            ui.style.opacity = 0;
            await wait(500);
            ui.style.display = 'none';

            moonContainer.style.opacity = 1;
            moonContainer.style.transform = 'scale(1)';
            setMsg("Target Locked: The Moon", "#fff");
            
            await wait(2000);

            // 2. Scan the Moon
            laser.style.display = 'block';
            setMsg("Deep Space Scanning Initiated...");
            await wait(3000);

            // 3. Moon Explodes into Particles (The WOW moment)
            setMsg("Decrypting Cosmic Data...", "var(--cyan)");
            laser.style.display = 'none';
            moonContainer.style.transform = 'scale(0.1)';
            moonContainer.style.opacity = 0;
            
            await wait(400); // Wait for shrink

            isAnimating = true;
            animate();
            
            // Boom! Moon becomes CHANDAMAMA
            formText("CHANDAMAMA", "#00e5ff");
            await wait(3500);

            // 4. Second Morph
            setMsg("Real identity found...", "var(--pink)");
            explode(); // Shockwave effect
            await wait(600);
            
            // Morph to KEERTHANA
            formText("KEERTHANA", "#ff00ea");
            await wait(3500);

            // 5. Final Romantic Polish
            status.style.opacity = 0;
            finalMsg.style.opacity = 1;

            // Make particles sparkle beautifully at the end
            setInterval(() => {
                particles.forEach(p => {
                    if(Math.random() > 0.95) {
                        p.color = '#fff';
                        p.radius = Math.random() * 3 + 1;
                    } else {
                        p.color = '#ff00ea';
                        p.radius = Math.random() * 1.5 + 1;
                    }
                });
            }, 100);
        }
    </script>
</body>
</html>
