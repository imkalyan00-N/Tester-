<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan's Ultimate Proof</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f3ff;
            --pink: #ff00ea;
            --dark: #020208;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--dark);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Deep Space Background */
        #space-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0a20 0%, #000000 100%);
            z-index: 0;
        }

        /* Particle Canvas for Text Morphing */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* Marvel JARVIS HUD Elements */
        .hud-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            z-index: 5;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
        }

        .hud-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid transparent;
        }

        .circle-1 {
            width: 100%;
            height: 100%;
            border-top: 2px solid var(--cyan);
            border-bottom: 2px solid var(--cyan);
            animation: rotate 4s linear infinite;
            box-shadow: 0 0 15px var(--cyan), inset 0 0 15px var(--cyan);
        }

        .circle-2 {
            width: 80%;
            height: 80%;
            border-left: 2px dashed rgba(0, 243, 255, 0.5);
            border-right: 2px dashed rgba(0, 243, 255, 0.5);
            animation: rotate-reverse 6s linear infinite;
        }

        .circle-3 {
            width: 60%;
            height: 60%;
            border: 1px dotted var(--pink);
            animation: rotate 10s linear infinite;
            box-shadow: 0 0 10px var(--pink);
        }

        /* The Moon */
        .moon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #fff, #ccc 50%, #555 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px #fff, 0 0 80px rgba(255,255,255,0.4);
            z-index: 4;
            opacity: 0;
            transition: all 1s ease;
        }

        .moon::before {
            content: '';
            position: absolute;
            top: 20%; left: 20%;
            width: 20px; height: 20px;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
        }

        .moon::after {
            content: '';
            position: absolute;
            bottom: 30%; right: 30%;
            width: 30px; height: 30px;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2);
        }

        /* UI Overlay */
        .ui-overlay {
            position: absolute;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            transition: opacity 0.5s;
        }

        .start-btn {
            background: rgba(0, 243, 255, 0.1);
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 15px 30px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4), inset 0 0 10px rgba(0, 243, 255, 0.2);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .start-btn:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 30px var(--cyan);
            transform: scale(1.05);
        }

        .status-text {
            position: absolute;
            bottom: 15%;
            font-size: 1.2rem;
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
            letter-spacing: 2px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .final-message {
            position: absolute;
            top: 65%;
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: var(--pink);
            text-shadow: 0 0 20px var(--pink), 0 0 40px #fff;
            opacity: 0;
            transition: opacity 2s ease;
            text-align: center;
            width: 100%;
        }

        .kalyan-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: #fff;
            letter-spacing: 2px;
            margin-top: 10px;
            text-shadow: 0 0 10px #fff;
        }

        /* Animations */
        @keyframes rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes rotate-reverse {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 40px #fff, 0 0 80px rgba(255,255,255,0.4); }
            50% { box-shadow: 0 0 60px var(--cyan), 0 0 120px rgba(0,243,255,0.6); }
            100% { box-shadow: 0 0 40px #fff, 0 0 80px rgba(255,255,255,0.4); }
        }

        .moon-scanning {
            animation: pulse-glow 2s infinite;
        }
    </style>
</head>
<body>

    <!-- Twinkling Space Background -->
    <div id="space-bg"></div>

    <!-- Magical Particle Text Canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- JARVIS HUD Elements -->
    <div class="hud-container" id="hud">
        <div class="hud-circle circle-1"></div>
        <div class="hud-circle circle-2"></div>
        <div class="hud-circle circle-3"></div>
    </div>

    <!-- The Moon -->
    <div class="moon" id="moon"></div>

    <!-- UI Overlay for Start -->
    <div class="ui-overlay" id="intro-ui">
        <h1 class="text-2xl mb-8 text-cyan-400 glowing tracking-widest text-center px-4" style="text-shadow: 0 0 15px #00f3ff;">
            COSMIC TRUTH PROTOCOL
        </h1>
        <p class="text-gray-300 mb-8 text-center max-w-md px-4 leading-relaxed">
            Keerthana, eppudaina aakasam vanka chusi alochinchava?<br>
            Nijam theluskovalante kinda unna button nokku.
        </p>
        <button class="start-btn" onclick="initiateSequence()">Nijam Chudu</button>
    </div>

    <!-- Scanning Status Text -->
    <div class="status-text" id="status">System Initialized...</div>

    <!-- Final Romantic Message -->
    <div class="final-message" id="final-msg">
        Nuvve na Chandamama! ❤️
        <div class="kalyan-tag">- Kalyan eppudu nijame chepthadu 😉</div>
    </div>

    <script>
        // --- 1. Background Stars Setup ---
        const spaceBg = document.getElementById('space-bg');
        for (let i = 0; i < 150; i++) {
            let star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.backgroundColor = '#fff';
            star.style.borderRadius = '50%';
            star.style.opacity = Math.random();
            star.style.animation = `pulse-glow ${2 + Math.random() * 3}s infinite alternate`;
            spaceBg.appendChild(star);
        }

        // --- 2. Advanced Particle Text Morphing Engine ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let w, h;
        let particles = [];
        let targetPositions = [];
        let isAnimating = false;

        function resizeCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                // Start from center or random
                this.x = w / 2;
                this.y = h / 2;
                this.targetX = x;
                this.targetY = y;
                this.color = color;
                this.size = Math.random() * 2 + 1;
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
                this.friction = 0.85; // Marvel magic floating feel
                this.spring = 0.05;
            }

            update() {
                let dx = this.targetX - this.x;
                let dy = this.targetY - this.y;
                
                // Spring physics for smooth snap to text
                this.vx += dx * this.spring;
                this.vy += dy * this.spring;
                
                this.vx *= this.friction;
                this.vy *= this.friction;
                
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Explode particles randomly before forming next word
            explode() {
                this.targetX = Math.random() * w;
                this.targetY = Math.random() * h;
                this.spring = 0.02; // slower floating
                this.friction = 0.95;
            }
        }

        // Extract pixel data from text to create particles
        function getTextParticles(text, fontSize, fontFamily, color) {
            // Use a temporary canvas to get pixel data
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
            tempCanvas.width = w;
            tempCanvas.height = h;

            tempCtx.fillStyle = color;
            // Adjust font size for mobile
            let adjustedSize = fontSize;
            if(w < 600) adjustedSize = fontSize * 0.5;

            tempCtx.font = `900 ${adjustedSize}px ${fontFamily}`;
            tempCtx.textAlign = 'center';
            tempCtx.textBaseline = 'middle';
            tempCtx.fillText(text, w / 2, h / 2 - 50); // Shifted slightly up

            const data32 = new Uint32Array(tempCtx.getImageData(0, 0, w, h).data.buffer);
            let positions = [];

            // Density of particles (higher gap = less particles)
            let gap = w < 600 ? 3 : 5;

            for (let y = 0; y < h; y += gap) {
                for (let x = 0; x < w; x += gap) {
                    if (data32[y * w + x]) {
                        positions.push({x, y});
                    }
                }
            }
            return positions;
        }

        function createText(text, fontSize, fontFamily, color) {
            targetPositions = getTextParticles(text, fontSize, fontFamily, color);
            
            // If first time, create particles. Otherwise, update targets.
            if (particles.length === 0) {
                for (let i = 0; i < targetPositions.length; i++) {
                    particles.push(new Particle(targetPositions[i].x, targetPositions[i].y, color));
                }
            } else {
                // Adjust particle count to match new word
                if(particles.length < targetPositions.length) {
                    let diff = targetPositions.length - particles.length;
                    for(let i=0; i<diff; i++) {
                        // Start new particles from current random particles to make it organic
                        let p = particles[Math.floor(Math.random() * particles.length)];
                        let newP = new Particle(p.x, p.y, color);
                        newP.x = p.x; newP.y = p.y; // force position
                        particles.push(newP);
                    }
                }
                
                // Assign new targets
                for (let i = 0; i < particles.length; i++) {
                    if (i < targetPositions.length) {
                        particles[i].targetX = targetPositions[i].x;
                        particles[i].targetY = targetPositions[i].y;
                        particles[i].color = color;
                        particles[i].spring = 0.05 + Math.random() * 0.05; // Randomize snap speed
                    } else {
                        // Extra particles fly away
                        particles[i].targetX = (Math.random() - 0.5) * w * 3;
                        particles[i].targetY = (Math.random() - 0.5) * h * 3;
                    }
                }
            }
        }

        function animateParticles() {
            if (!isAnimating) return;
            ctx.clearRect(0, 0, w, h);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        // --- 3. The Cinematic Sequence ---
        const introUi = document.getElementById('intro-ui');
        const moon = document.getElementById('moon');
        const hud = document.getElementById('hud');
        const statusEl = document.getElementById('status');
        const finalMsg = document.getElementById('final-msg');

        function updateStatus(text, color = "var(--cyan)") {
            statusEl.style.opacity = 0;
            setTimeout(() => {
                statusEl.innerText = text;
                statusEl.style.color = color;
                statusEl.style.textShadow = `0 0 10px ${color}`;
                statusEl.style.opacity = 1;
            }, 500);
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function initiateSequence() {
            // 1. Hide Intro
            introUi.style.opacity = 0;
            await sleep(500);
            introUi.style.display = 'none';

            // 2. Show Moon & HUD
            moon.style.opacity = 1;
            hud.style.opacity = 1;
            updateStatus("Prapancham lo athi andhamaina daani kosam vethukuthunnam...");
            await sleep(3000);

            // 3. Scan Moon
            moon.classList.add('moon-scanning');
            updateStatus("Target dorikindi... Scanning CHANDAMAMA...");
            await sleep(3000);

            // 4. Hide Moon, Start Particle Magic
            moon.style.opacity = 0;
            hud.style.opacity = 0;
            isAnimating = true;
            animateParticles();
            
            // Form "CHANDAMAMA"
            updateStatus("Chandamama gundello emundo decrpyt chesthunnam...", "var(--cyan)");
            createText("CHANDAMAMA", 120, "Orbitron", "#00f3ff");
            await sleep(4000);

            // 5. The Morph! (Explode and reform)
            updateStatus("Magic processing... Nijam bayatapadtundi!", "#ff00ea");
            // Explode particles slightly for impact
            particles.forEach(p => p.explode());
            await sleep(1000);

            // Form "KEERTHANA"
            createText("KEERTHANA", 140, "Orbitron", "#ff00ea");
            await sleep(3000);

            // 6. Final Romantic Polish
            statusEl.style.opacity = 0;
            finalMsg.style.opacity = 1;
            
            // Turn particles into floating hearts/stars effect
            particles.forEach(p => {
                p.explode();
                p.color = Math.random() > 0.5 ? '#ff00ea' : '#fff';
            });
        }
    </script>
</body>
</html>
